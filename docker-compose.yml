services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leaderboard
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: leaderboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://leaderboard:hackathon@postgres:5432/leaderboard
    depends_on:
      - postgres
    volumes:
      - ./Config.toml:/app/Config.toml

volumes:
  postgres_data:
