<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LibreBoard</h1>
            <button id="toggleViewBtn" class="toggle-view-btn">Admin Mode</button>
        </header>

        <main id="regularView">
            <div class="top-grid">
                <section class="leaderboard-section">
                    <h2>Top 10</h2>
                    <div id="leaderboard"></div>
                </section>

                <div class="actions-grid">
                    <section class="section">
                        <h3>Add Entry</h3>
                        <form id="addEntryForm">
                            <input type="text" id="username" placeholder="Username" required>
                            <input type="number" id="score" placeholder="Score" step="any" required>
                            <button type="submit">Add</button>
                        </form>
                    </section>

                    <section class="section">
                        <h3>Remove Entry</h3>
                        <form id="removeEntryForm">
                            <input type="text" id="removeUsername" placeholder="Username" required>
                            <button type="submit">Remove</button>
                        </form>
                    </section>

                    <section class="section">
                        <h3>Stress Test</h3>
                        <div class="stress-controls">
                            <button type="button" id="startStress" class="stress-btn">Start</button>
                            <button type="button" id="stopStress" class="stress-btn stop">Stop</button>
                        </div>
                        <div class="stress-status" id="stressStatus">Idle</div>
                    </section>
                </div>
            </div>

            <div class="stats-grid">
                <section class="section">
                    <h3>Statistics</h3>
                    <dl class="data-list">
                        <div>
                            <dt>Total</dt>
                            <dd id="totalEntries">0</dd>
                        </div>
                        <div>
                            <dt>Mean</dt>
                            <dd id="meanScore">0</dd>
                        </div>
                        <div>
                            <dt>Median</dt>
                            <dd id="medianScore">0</dd>
                        </div>
                        <div>
                            <dt>Std Dev</dt>
                            <dd id="stdDev">0</dd>
                        </div>
                        <div>
                            <dt>Q1 (25th)</dt>
                            <dd id="q1Score">0</dd>
                        </div>
                        <div>
                            <dt>Q3 (75th)</dt>
                            <dd id="q3Score">0</dd>
                        </div>
                        <div>
                            <dt>Min</dt>
                            <dd id="minScore">0</dd>
                        </div>
                        <div>
                            <dt>Max</dt>
                            <dd id="maxScore">0</dd>
                        </div>
                    </dl>
                </section>

                <section class="section">
                    <h3>Performance</h3>
                    <dl class="data-list">
                        <div>
                            <dt>/add</dt>
                            <dd id="addPerf">0ms</dd>
                        </div>
                        <div>
                            <dt>/remove</dt>
                            <dd id="removePerf">0ms</dd>
                        </div>
                        <div>
                            <dt>/leaderboard</dt>
                            <dd id="leaderboardPerf">0ms</dd>
                        </div>
                        <div>
                            <dt>/info</dt>
                            <dd id="infoPerf">0ms</dd>
                        </div>
                    </dl>
                </section>
            </div>
        </main>

        <main id="adminView" style="display: none;">
            <section class="section admin-auth" id="adminAuthSection">
                <h2>Admin Authentication</h2>
                <form id="adminAuthForm">
                    <input type="password" id="adminToken" placeholder="Enter Admin Token" required>
                    <button type="submit">Authenticate</button>
                </form>
                <div id="adminStatus" class="admin-status"></div>
            </section>

            <div id="adminPanel" style="display: none;">
                <section class="section">
                    <h2>Board Configuration</h2>
                    <form id="updateTitleForm">
                        <label>Board Title</label>
                        <input type="text" id="newTitle" placeholder="New Board Title" required>
                        <button type="submit">Update Title</button>
                    </form>
                </section>

                <section class="section">
                    <h2>Sort Order</h2>
                    <form id="updateSortForm">
                        <label>Leaderboard Sort Order</label>
                        <select id="sortOrder" required>
                            <option value="">Select Sort Order</option>
                            <option value="descending">Descending (High to Low)</option>
                            <option value="ascending">Ascending (Low to High)</option>
                        </select>
                        <button type="submit">Update Sort Order</button>
                    </form>
                </section>

                <section class="section">
                    <h2>Session</h2>
                    <button type="button" id="logoutAdmin" class="logout-btn">Logout</button>
                </section>
            </div>
        </main>
    </div>

    <div id="statusMessage"></div>
    <script src="script.js"></script>
</body>
</html>
